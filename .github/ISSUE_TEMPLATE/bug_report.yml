name: Bug report
description: Report a problem with the configurator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output
      description: Paste app output or terminal output. Do not paste API Keys.
      render: text
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Click ...
        3. See ...
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed API Keys, tokens, and private data from this issue.
          required: true
