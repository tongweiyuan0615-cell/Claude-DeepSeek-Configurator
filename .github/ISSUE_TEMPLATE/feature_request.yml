name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: request
    attributes:
      label: What do you want to improve?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Both
        - Docs / CI
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
