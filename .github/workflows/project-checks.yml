name: Project checks

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
      - "scripts/check-version-consistency.mjs"
      - "windows/package.json"
      - "windows/package-lock.json"
      - "windows/src-tauri/Cargo.toml"
      - "windows/src-tauri/tauri.conf.json"
      - "macos/package.json"
      - "macos/package-lock.json"
      - "macos/src-tauri/Cargo.toml"
      - "macos/src-tauri/tauri.conf.json"
      - ".github/workflows/project-checks.yml"

jobs:
  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check manifest versions
        run: node scripts/check-version-consistency.mjs
