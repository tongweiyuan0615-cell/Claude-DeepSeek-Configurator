name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build Tauri installer
    runs-on: windows-latest
    defaults:
      run:
        working-directory: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: windows/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Bundle portable Node.js runtime
        shell: pwsh
        run: |
          $version = "20.20.2"
          $zip = "$env:RUNNER_TEMP\node.zip"
          $extract = "$env:RUNNER_TEMP\node-runtime"
          $target = "src-tauri\resources\node"
          Invoke-WebRequest "https://nodejs.org/dist/v$version/node-v$version-win-x64.zip" -OutFile $zip
          Expand-Archive $zip -DestinationPath $extract
          Remove-Item $target -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path "src-tauri\resources" -Force | Out-Null
          Move-Item "$extract\node-v$version-win-x64" $target
          & "$target\node.exe" --version
          & "$target\npm.cmd" --version

      - name: Build Windows installer
        run: npm run tauri -- build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          if-no-files-found: error
          path: windows/src-tauri/target/release/bundle/msi/*.msi
